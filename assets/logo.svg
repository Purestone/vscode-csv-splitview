<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">CSV Preview Logo</title>
  <desc id="desc">Minimal split-view logo: left quarter text file area, right three-quarter table preview area with colorful columns.</desc>

  <rect x="0" y="0" width="512" height="512" rx="48" fill="#FFFFFF" stroke="#DDE7F5" stroke-width="2"/>

  <line x1="128" y1="32" x2="128" y2="480" stroke="#D3DEEE" stroke-width="2"/>

  <g stroke="#8AA1BE" stroke-width="2.5" stroke-linecap="round">
    <line x1="35" y1="80" x2="100" y2="80"/>
    <line x1="35" y1="110" x2="105" y2="110"/>
    <line x1="35" y1="140" x2="95" y2="140"/>
    <line x1="35" y1="170" x2="102" y2="170"/>
    <line x1="35" y1="200" x2="90" y2="200"/>
    <line x1="35" y1="230" x2="105" y2="230"/>
    <line x1="35" y1="260" x2="98" y2="260"/>
    <line x1="35" y1="290" x2="92" y2="290"/>
  </g>

  <rect x="150" y="60" width="340" height="380" rx="20" fill="#FFFFFF" stroke="#22354D" stroke-width="9"/>

  <rect x="170" y="85" width="60" height="32" rx="6" fill="#E94B3C"/>
  <rect x="238" y="85" width="60" height="32" rx="6" fill="#F39C12"/>
  <rect x="306" y="85" width="60" height="32" rx="6" fill="#2BB673"/>
  <rect x="374" y="85" width="106" height="32" rx="6" fill="#2D7FF9"/>

  <g stroke="#D7E1EE" stroke-width="3">
    <line x1="170" y1="131" x2="476" y2="131"/>
    <line x1="170" y1="171" x2="476" y2="171"/>
    <line x1="170" y1="211" x2="476" y2="211"/>
    <line x1="170" y1="251" x2="476" y2="251"/>
    <line x1="170" y1="291" x2="476" y2="291"/>
    <line x1="170" y1="331" x2="476" y2="331"/>
    <line x1="170" y1="371" x2="476" y2="371"/>

    <line x1="228" y1="85" x2="228" y2="428"/>
    <line x1="296" y1="85" x2="296" y2="428"/>
    <line x1="364" y1="85" x2="364" y2="428"/>
  </g>

  <rect x="150" y="60" width="340" height="380" rx="20" stroke="#22354D" stroke-width="9"/>
